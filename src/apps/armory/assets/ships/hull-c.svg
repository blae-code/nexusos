  <rect class="ship-detail" x="30" y="90" width="42" height="20" rx="2"/>
  <rect class="ship-detail" x="128" y="90" width="42" height="20" rx="2"/>
  <rect class="ship-detail" x="38" y="128" width="34" height="20" rx="2"/>
  <rect class="ship-detail" x="128" y="128" width="34" height="20" rx="2"/>
  <path class="ship-detail" d="M72 62H128"/>
  <path class="ship-detail" d="M72 100H128"/>
  <path class="ship-detail" d="M72 138H128"/>
  <circle class="ship-hardpoint" cx="100" cy="40" r="4" data-hardpoint-id="turret-fore" data-hardpoint-type="turret"/>
  <circle class="ship-hardpoint" cx="66" cy="100" r="4" data-hardpoint-id="turret-port" data-hardpoint-type="turret"/>
