<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none"
     stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer ring r=14, gap at SW (150°→120°) — the Scar motif at highest rank -->
  <!-- 150°: x=3.9, y=23  |  120°: x=9, y=28.1 -->
  <path d="M 3.9 23 A 14 14 0 1 1 9 28.1" stroke-width="0.6"/>
  <path d="M 9 28.1 L 7 26 L 5 24" stroke-width="0.3"
        stroke-dasharray="0.5 1.2" opacity="0.42"/>
  <!-- Inner ring r=8.5 -->
  <circle cx="16" cy="16" r="8.5" stroke-width="0.5"/>
  <!-- Cardinal arms -->
  <line x1="16" y1="2"  x2="16" y2="7.5"  stroke-width="1.5"/>
  <line x1="30" y1="16" x2="24.5" y2="16" stroke-width="1.5"/>
  <line x1="16" y1="30" x2="16"   y2="24.5" stroke-width="1.5"/>
  <line x1="2"  y1="16" x2="7.5"  y2="16"  stroke-width="1.5"/>
  <!-- N arrowhead -->
  <path d="M 16 2 L 15 5 L 16 3.8 L 17 5 Z" stroke-width="0.5"/>
  <!-- Diagonal arms — NE, SE, NW full; SW is scar arm -->
  <!-- NE 315°: 16+14×0.707=25.9, 16-14×0.707=6.1 -->
  <line x1="16" y1="16" x2="25.9" y2="6.1"  stroke-width="0.75"/>
  <line x1="16" y1="16" x2="25.9" y2="25.9" stroke-width="0.75"/>
  <line x1="16" y1="16" x2="6.1"  y2="6.1"  stroke-width="0.75"/>
  <!-- SW scar arm + ghost continuation -->
  <line x1="16" y1="16" x2="10"   y2="22"   stroke-width="0.75"/>
  <line x1="9"  y1="23" x2="6.5"  y2="25.5" stroke-width="0.35"
        stroke-dasharray="0.6 1.3" opacity="0.48"/>
  <!-- Corner diamonds at NE and SE arm tips -->
  <path d="M 25.9 4.6  L 27.4 6.1  L 25.9 7.6  L 24.4 6.1  Z" stroke-width="0.5"/>
  <path d="M 25.9 24.4 L 27.4 25.9 L 25.9 27.4 L 24.4 25.9 Z" stroke-width="0.5"/>
  <!-- Cardinal ticks on inner ring -->
  <line x1="16"   y1="7.5"  x2="16"   y2="9.5"  stroke-width="0.8"/>
  <line x1="24.5" y1="16"   x2="22.5" y2="16"   stroke-width="0.8"/>
  <line x1="16"   y1="24.5" x2="16"   y2="22.5" stroke-width="0.8"/>
  <line x1="7.5"  y1="16"   x2="9.5"  y2="16"   stroke-width="0.8"/>
  <!-- Center diamond -->
  <path d="M 16 13 L 19 16 L 16 19 L 13 16 Z" stroke-width="0.75"/>
  <!-- Center point -->
  <circle cx="16" cy="16" r="1" stroke-width="0.6"/>
</svg>
