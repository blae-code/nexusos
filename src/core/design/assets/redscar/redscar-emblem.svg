<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none"
     stroke="var(--t1)" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer ring r=28, gap at SW (~120°–150°) — the Scar -->
  <!-- 150°: x=7.8, y=46  |  120°: x=18, y=56.2  |  large arc CW = 330° of ring -->
  <path d="M 7.8 46 A 28 28 0 1 1 18 56.2" stroke-width="0.7"/>
  <!-- Scar ghost — dashed fragment bridging the gap -->
  <path d="M 16 57.5 L 12.5 52.5 L 9 47.5" stroke-width="0.35"
        stroke-dasharray="0.7 1.5" opacity="0.38"/>

  <!-- Cardinal arms (extend slightly beyond outer ring) -->
  <line x1="32" y1="32" x2="32" y2="2"  stroke-width="1.4"/>
  <line x1="32" y1="32" x2="62" y2="32" stroke-width="1.4"/>
  <line x1="32" y1="32" x2="32" y2="62" stroke-width="1.4"/>
  <line x1="32" y1="32" x2="2"  y2="32" stroke-width="1.4"/>

  <!-- N arrowhead -->
  <path d="M 32 2 L 30.2 8 L 32 5.5 L 33.8 8 Z" stroke-width="0.65"/>

  <!-- Diagonal arms (to outer ring edge) -->
  <!-- NE 315°: cos=0.707, sin=-0.707 → x=32+28×0.707=51.8, y=32-28×0.707=12.2 -->
  <line x1="32" y1="32" x2="51.8" y2="12.2" stroke-width="0.8"/>
  <!-- SE 45°: x=51.8, y=51.8 -->
  <line x1="32" y1="32" x2="51.8" y2="51.8" stroke-width="0.8"/>
  <!-- NW 225°: x=12.2, y=12.2 -->
  <line x1="32" y1="32" x2="12.2" y2="12.2" stroke-width="0.8"/>
  <!-- SW 135° — the Scar arm: solid segment + ghost continuation -->
  <line x1="32" y1="32" x2="22"   y2="42"   stroke-width="0.8"/>
  <line x1="20"  y1="44" x2="14.5" y2="49.5" stroke-width="0.38"
        stroke-dasharray="0.8 1.6" opacity="0.48"/>

  <!-- Inner ring r=10 -->
  <circle cx="32" cy="32" r="10" stroke-width="0.5"/>

  <!-- Cardinal ticks radiating outward from inner ring -->
  <line x1="32" y1="22" x2="32" y2="19" stroke-width="0.9"/>
  <line x1="42" y1="32" x2="45" y2="32" stroke-width="0.9"/>
  <line x1="32" y1="42" x2="32" y2="45" stroke-width="0.9"/>
  <line x1="22" y1="32" x2="19" y2="32" stroke-width="0.9"/>

  <!-- Center diamond -->
  <path d="M 32 27.5 L 36.5 32 L 32 36.5 L 27.5 32 Z" stroke-width="0.7"/>
  <!-- Center point -->
  <circle cx="32" cy="32" r="1.2" stroke-width="0.65"/>
</svg>
