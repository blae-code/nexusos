<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-linecap="round">
  <!-- Primary velocity chevron -->
  <path d="M 8 6 L 17 12 L 8 18" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Trailing speed lines -->
  <line x1="2" y1="8.5"  x2="7" y2="8.5"  stroke-width="0.9"/>
  <line x1="2" y1="12"   x2="7" y2="12"   stroke-width="0.7"/>
  <line x1="2" y1="15.5" x2="7" y2="15.5" stroke-width="0.5"/>
  <!-- Leading edge echo -->
  <path d="M 14 9.5 L 20 12 L 14 14.5" stroke-width="0.65" opacity="0.5"/>
</svg>
