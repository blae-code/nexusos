<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-linecap="round">
  <circle cx="12" cy="12" r="9" stroke-width="0.7"/>
  <!-- Crosshairs — extend beyond outer ring, stop at inner aim circle -->
  <line x1="12" y1="1"  x2="12" y2="8"  stroke-width="0.75"/>
  <line x1="12" y1="16" x2="12" y2="23" stroke-width="0.75"/>
  <line x1="1"  y1="12" x2="8"  y2="12" stroke-width="0.75"/>
  <line x1="16" y1="12" x2="23" y2="12" stroke-width="0.75"/>
  <!-- Inner aim circle -->
  <circle cx="12" cy="12" r="3"   stroke-width="0.7"/>
  <!-- Center point -->
  <circle cx="12" cy="12" r="0.9" stroke-width="0.5"/>
</svg>
