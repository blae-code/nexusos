<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='26' fill='none' stroke='%234a5070' stroke-width='3'/%3E%3Ccircle cx='32' cy='32' r='15' fill='none' stroke='%234a5070' stroke-width='2' stroke-dasharray='5 3'/%3E%3Ccircle cx='32' cy='32' r='4' fill='%237a8098'/%3E%3Cline x1='32' y1='8' x2='32' y2='20' stroke='%239096a8' stroke-width='3'/%3E%3Cpolygon points='32,20 38,31 26,31' fill='%239096a8'/%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <style>
      html, body, #root {
        height: 100%;
      }

      body {
        margin: 0;
        background: #07080b;
        color: #dde1f0;
        font-family: 'SF Mono', ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      }
    </style>
    <script>
      (function () {
        var pathname = window.location.pathname || '/';
        var markers = ['/gate', '/AccessGate', '/boot', '/setup', '/training', '/onboarding', '/app'];
        var markerIndex = -1;

        for (var i = 0; i < markers.length; i += 1) {
          var nextIndex = pathname.indexOf(markers[i]);
          if (nextIndex >= 0 && (markerIndex === -1 || nextIndex < markerIndex)) {
            markerIndex = nextIndex;
          }
        }

        var basePath = markerIndex >= 0 ? pathname.slice(0, markerIndex) : pathname;
        if (!basePath || basePath === '/') {
          basePath = '/';
        } else if (!basePath.endsWith('/')) {
          basePath += '/';
        }

        window.__NEXUSOS_BASE_PATH__ = basePath === '/' ? '' : basePath.slice(0, -1);
        var baseElement = document.createElement('base');
        baseElement.setAttribute('href', basePath);
        document.head.appendChild(baseElement);
      })();
    </script>
    <link rel="manifest" href="./manifest.json" />
    <title>NexusOS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js', { scope: './' });
        });
      }
    </script>
  </body>
</html>
