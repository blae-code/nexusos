<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body, #root {
        height: 100%;
      }

      body {
        margin: 0;
        background: #07080b;
        color: #dde1f0;
        font-family: 'SF Mono', ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      }
    </style>
    <script>
      (function () {
        var pathname = window.location.pathname || '/';
        var markers = ['/gate', '/AccessGate', '/app'];
        var markerIndex = -1;

        for (var i = 0; i < markers.length; i += 1) {
          var nextIndex = pathname.indexOf(markers[i]);
          if (nextIndex >= 0 && (markerIndex === -1 || nextIndex < markerIndex)) {
            markerIndex = nextIndex;
          }
        }

        var basePath = markerIndex >= 0 ? pathname.slice(0, markerIndex) : pathname;
        if (!basePath || basePath === '/') {
          basePath = '/';
        } else if (!basePath.endsWith('/')) {
          basePath += '/';
        }

        window.__NEXUSOS_BASE_PATH__ = basePath === '/' ? '' : basePath.slice(0, -1);
        var baseElement = document.createElement('base');
        baseElement.setAttribute('href', basePath);
        document.head.appendChild(baseElement);
      })();
    </script>
    <link rel="manifest" href="./manifest.json" />
    <title>Base44 APP</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
